<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Analytics Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="d-flex">
    <!-- Sidebar -->
    <nav class="bg-dark text-white p-3 vh-100" style="width: 220px;">
      <h4 class="mb-4">EventEase</h4>
      <ul class="nav flex-column">
        <li class="nav-item"><a class="nav-link text-white" href="#">Reports</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">Events</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">Profile</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">Logout</a></li>
      </ul>
    </nav>
    <!-- Main Content -->
    <div class="flex-grow-1">
      <!-- Header -->
      <header class="d-flex justify-content-between align-items-center p-3 border-bottom">
        <h5>Analytics Dashboard</h5>
        <div>
          <input type="search" class="form-control d-inline-block me-2" placeholder="Search..." style="width: 200px;" />
          <select class="form-select d-inline-block" style="width: 180px;">
            <option>This Month</option>
            <option>Last Month</option>
            <option>Custom Range</option>
          </select>
        </div>
      </header>
      <!-- Stats Cards -->
      <div class="container my-4">
        <div class="row g-4">
          <div class="col-md-4">
            <div class="card text-center">
              <div class="card-body">
                <h6>Total Events</h6>
                <p>23 (5 Active)</p>
                <a href="#" class="btn btn-sm btn-outline-primary">View Details</a>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card text-center">
              <div class="card-body">
                <h6>Total Users</h6>
                <p>1,247</p>
                <a href="#" class="btn btn-sm btn-outline-primary">View Details</a>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card text-center">
              <div class="card-body">
                <h6>Active Users</h6>
                <p>45</p>
                <a href="#" class="btn btn-sm btn-outline-primary">View Details</a>
              </div>
            </div>
          </div>
        </div>
        <!-- Charts Section -->
        <!-- Charts Section -->
        <div class="mt-5">
            <h6>Charts:</h6>
            <div class="row g-4">
                <div class="col-md-4">
                    <canvas id="participationChart"></canvas>
                </div>
                <div class="col-md-4">
                    <canvas id="growthChart"></canvas>
                </div>
                <div class="col-md-4">
                    <canvas id="successChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Quick Reports -->
        <div class="mt-4 text-end">
          <button class="btn btn-primary me-2">Generate Monthly</button>
          <button class="btn btn-secondary">Export All Data</button>
        </div>
      </div>
    </div>
  </div>
  <script>
  const participationChart = new Chart(document.getElementById('participationChart'), {
    type: 'line',
    data: {
      labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
      datasets: [{
        label: 'Participation',
        data: [12, 19, 14, 22],
        borderColor: 'rgba(75, 192, 192, 1)',
        fill: false
      }]
    }
  });

  const growthChart = new Chart(document.getElementById('growthChart'), {
    type: 'bar',
    data: {
      labels: ['Jan', 'Feb', 'Mar', 'Apr'],
      datasets: [{
        label: 'User Growth',
        data: [200, 300, 400, 500],
        backgroundColor: 'rgba(153, 102, 255, 0.6)'
      }]
    }
  });

  const successChart = new Chart(document.getElementById('successChart'), {
    type: 'doughnut',
    data: {
      labels: ['Successful', 'Unsuccessful'],
      datasets: [{
        data: [80, 20],
        backgroundColor: ['#28a745', '#dc3545']
      }]
    }
  });
</script>

</body>
</html>
